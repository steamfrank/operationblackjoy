<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Operation: Black Joy — AR View</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* AR Camera Overlay Overrides */
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent;
    }

    .ar-ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1rem;
      box-sizing: border-box;
    }

    .ar-top-bar, .ar-bottom-bar {
      pointer-events: auto;
    }

    /* Floating AR Card Styling */
    .ar-floating-card-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85vw;
      max-width: 450px;
      aspect-ratio: 3 / 2;
      pointer-events: auto;
      perspective: 1000px;
      z-index: 900;
    }

    .ar-card-shadow {
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>

  <div class="ar-ui-overlay">
    
    <div class="ar-top-bar">
      <a href="scrapbook.html" class="action-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
        ◀ Back to Scrapbook
      </a>
    </div>

    <div class="ar-floating-card-container">
      <div id="ar-postcard-wrapper" class="postcard-wrapper is-flipped ar-card-shadow">
        
        <div class="card-side card-front">
          <div class="photo-frame">
            <img id="ar-postcard-photo" src="" alt="Postcard Front Photo">
          </div>
        </div>

        <div class="card-side card-back">
          <div class="back-header">
            <img src="assets/logo-transparent.png" alt="Operation Black Joy" class="back-logo-transparent">
            <div class="stamp-area">
              <img id="ar-selected-stamp" src="assets/stamp-aaam2026.png" alt="Event Stamp">
            </div>
          </div>

          <div class="back-body">
            <div class="message-area">
              <p id="ar-display-message" class="handwritten-text"></p>
            </div>
            <div class="divider-line"></div>
            <div class="credit-area">
              <div class="credit-block">
                <p class="credit-line"><strong>Archive Credit:</strong></p>
                <a id="ar-archive-source-link" href="#" target="_blank" rel="noopener noreferrer" class="external-image-link">
                  🔗 PACSCL Collection
                </a>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="ar-bottom-bar" style="text-align: center;">
      <button id="ar-flip-btn" class="action-btn" style="width: auto; padding: 0.75rem 1.5rem;">
        🔄 Flip Card
      </button>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cardId = urlParams.get("id");

      const postcardWrapper = document.getElementById("ar-postcard-wrapper");
      const flipBtn = document.getElementById("ar-flip-btn");

      // Load saved cards from LocalStorage
      const savedCards = JSON.parse(localStorage.getItem("operationBlackJoyScrapbook")) || [];
      const cardData = savedCards.find((card) => String(card.id) === String(cardId));

      if (cardData) {
        // Populate Front & Back Data
        document.getElementById("ar-postcard-photo").src = cardData.frontImage;
        document.getElementById("ar-display-message").textContent = cardData.message || "Sending joy & resilience!";
        document.getElementById("ar-selected-stamp").src = cardData.stamp || "assets/stamp-aaam2026.png";
        
        const archiveLink = document.getElementById("ar-archive-source-link");
        if (archiveLink && cardData.archiveUrl) {
          archiveLink.href = cardData.archiveUrl;
        }
      } else {
        document.getElementById("ar-display-message").textContent = "Operation: Black Joy Postcard";
      }

      // Flip toggle between front photo and back credit view
      if (flipBtn && postcardWrapper) {
        flipBtn.addEventListener("click", () => {
          postcardWrapper.classList.toggle("is-flipped");
        });
      }
    });
  </script>

</body>
</html>
