<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Operation: Black Joy — AR View</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent;
    }

    .ar-ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1rem;
      box-sizing: border-box;
    }

    .ar-top-bar {
      pointer-events: auto;
    }

    /* Floating Postcard Back Container (Fixed single-side display) */
    .ar-floating-card-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 88vw;
      max-width: 460px;
      aspect-ratio: 3 / 2;
      pointer-events: auto;
      z-index: 900;
    }

    .ar-card-shadow {
      box-shadow: 0 20px 40px rgba(0,0,0,0.45);
      border-radius: 12px;
    }

    .ar-single-back {
      position: relative !important;
      transform: none !important;
      backface-visibility: visible !important;
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }

    .simplified-link-btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.6rem 0.85rem;
      background-color: #2563eb;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      transition: background-color 0.2s ease;
    }

    .simplified-link-btn:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>

  <div class="ar-ui-overlay">
    
    <div class="ar-top-bar">
      <a href="scrapbook.html" class="action-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
        ◀ Back to Scrapbook
      </a>
    </div>

    <div class="ar-floating-card-container">
      <div class="card-side card-back ar-single-back ar-card-shadow">
        
        <div class="back-header">
          <img src="assets/logo-transparent.png" alt="Operation Black Joy" class="back-logo-transparent">
          <div class="stamp-area">
            <img id="ar-selected-stamp" src="assets/stamp-aaam2026.png" alt="Event Stamp">
          </div>
        </div>

        <div class="back-body">
          <div class="message-area">
            <p id="ar-display-message" class="handwritten-text"></p>
          </div>

          <div class="divider-line"></div>

          <div class="credit-area" style="justify-content: center; align-items: center; text-align: center;">
            <p class="credit-line" style="font-size: 0.85rem; color: #475569;">
              <strong>Archival Context</strong>
            </p>
            <a id="ar-archive-source-link" href="https://blackjoy.pacscl.org/omeka/s/bjr/page/welcome" target="_blank" rel="noopener noreferrer" class="simplified-link-btn">
              🔗 View Original Item
            </a>
          </div>
        </div>

      </div>
    </div>

    <div></div> </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const cardId = urlParams.get("id");

      const displayMessage = document.getElementById("ar-display-message");
      const selectedStamp = document.getElementById("ar-selected-stamp");
      const archiveLink = document.getElementById("ar-archive-source-link");

      // Load saved cards from LocalStorage
      const savedCards = JSON.parse(localStorage.getItem("operationBlackJoyScrapbook")) || [];
      const cardData = savedCards.find((card) => String(card.id) === String(cardId));

      if (cardData) {
        // 1. Populate handwritten message (checks all potential key names)
        const messageText = cardData.message || cardData.note || cardData.userMessage || "Celebrating Black Joy & Resilience!";
        if (displayMessage) displayMessage.textContent = messageText;

        // 2. Populate selected stamp image
        if (selectedStamp && cardData.stamp) {
          selectedStamp.src = cardData.stamp;
        }

        // 3. Set simplified link back to original Black Joy item page
        if (archiveLink && cardData.archiveUrl) {
          archiveLink.href = cardData.archiveUrl;
        }
      } else {
        // Default text if accessed without card parameters
        if (displayMessage) displayMessage.textContent = "Operation: Black Joy — Preserving community resilience and stories.";
      }
    });
  </script>

</body>
</html>
