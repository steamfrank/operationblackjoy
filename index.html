<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation: Black Joy — Welcome</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="main-content">
    
    <section class="hero-section">
      <img src="assets/logo.png" alt="Operation: Black Joy Logo" class="hero-logo-banner">
      <h1>Operation: Black Joy</h1>
      <p class="subtitle">An interactive digital archive celebrating joy, resilience, and community history.</p>
    </section>

    <section class="cassette-section">
      <div class="cassette-grid">
        <div class="cassette-card">
          <img src="assets/index/cassette-joy.png" alt="Side A: Joy Cassette Tape" class="cassette-img">
        </div>
        <div class="cassette-card">
          <img src="assets/index/cassette-resilience.png" alt="Side B: Resilience Cassette Tape" class="cassette-img">
        </div>
      </div>
    </section>

    <section class="badges-section">
      <div class="badges-grid">
        
        <a href="https://finch.go.link/iiAFW?adj_label=ShRQR" target="_blank" rel="noopener noreferrer" class="graphic-item">
          <img src="assets/index/finch.png" alt="Create a Postcard - Finch" class="inline-graphic">
        </a>

        <a href="https://blackjoy.pacscl.org/omeka/s/bjr/page/welcome" target="_blank" rel="noopener noreferrer" class="welcome-center-item graphic-link">
          <img src="assets/index/bjr-welcome.png" alt="Black Joy and Resilience Welcome" class="welcome-graphic">
          <span class="welcome-label">Learn more about Black Joy & Resilience here</span>
        </a>

        <a href="scrapbook.html" class="graphic-item">
          <img src="assets/index/scrapbook-link.png" alt="Virtual Scrapbook Link" class="inline-graphic">
        </a>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; Operation: Black Joy. All rights reserved.</p>
  </footer>

</body>
</html>
